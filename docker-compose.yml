version: '3.9'

services:
  # ---- PostgreSQL ------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: fichaje_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fichaje_db}
      POSTGRES_USER: ${POSTGRES_USER:-fichaje_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fichaje_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fichaje_user} -d ${POSTGRES_DB:-fichaje_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fichaje_net

  # ---- Backend (NestJS) -----------------------------------------
  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: fichaje_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-fichaje_user}:${POSTGRES_PASSWORD:-fichaje_pass}@postgres:5432/${POSTGRES_DB:-fichaje_db}?schema=public
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      BACKEND_PORT: 4000
      NODE_ENV: development
      CORS_ORIGINS: http://localhost:3020
      WHATSAPP_VERIFY_TOKEN: ${WHATSAPP_VERIFY_TOKEN:-}
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN:-}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID:-}
      WHATSAPP_API_VERSION: ${WHATSAPP_API_VERSION:-v19.0}
    ports:
      - "4000:4000"
    volumes:
      - ./apps/backend/src:/app/src:ro
    networks:
      - fichaje_net

  # ---- Frontend Web (Next.js) -----------------------------------
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: fichaje_web
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    ports:
      - "3020:3000"
    networks:
      - fichaje_net

volumes:
  postgres_data:

networks:
  fichaje_net:
    driver: bridge
